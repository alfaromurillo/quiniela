name: Actualizar predicciones

on:
  push:
    branches: [main]
  schedule:
    # 1.5 h before every possible UTC kickoff time (derived from schedule.json).
    # Prediction is shown at 1:30 before kickoff so it can be manually entered
    # into the quiniela before the 1:00-before deadline.
    # Also covers result-fetch windows (2 h group / 3.5 h knockout after kickoff).
    - cron: '30 14-23 * * *'    # 14:30–23:30 on :30  (1.5 h before 16:00–01:00)
    - cron: '30 0,1,2 * * *'    # 00:30, 01:30, 02:30  (1.5 h before 02:00–04:00; result windows)
    - cron: '0 0 * * *'          # 00:00                 (1.5 h before 01:30)
    - cron: '0 19 * * *'         # 19:00                 (1.5 h before 20:30)
    - cron: '0 22 * * *'         # 22:00                 (1.5 h before 23:30)
    - cron: '0 23 * * *'         # 23:00                 (1.5 h before 00:30)
    # Final daily update — midnight Costa Rica (UTC-6 = 06:00 UTC)
    - cron: '0 6 * * *'
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run prediction pipeline
        run: python model/predict.py

      - name: Fetch match results
        run: python model/results.py

      - name: Validate predictions
        run: python model/sanity.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/predictions.json \
                  site/data/locked_predictions.json \
                  site/data/results.json \
                  site/data/learning.json \
                  data/kalshi_cache.json
          if git diff --staged --quiet; then
            echo "No changes to predictions."
          else
            git commit -m "chore: update predictions $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main  # pull the freshly pushed commit

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
