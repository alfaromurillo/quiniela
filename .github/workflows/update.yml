name: Actualizar predicciones

on:
  push:
    branches: [main]
  schedule:
    # Two fetches per match: 2h15m and 1h30m before kickoff.
    # CACHE_TTL=40min ensures the -1:30 run always re-fetches after the -2:15 run.
    # Cache locks 10 min before kickoff; result windows covered by the :30 runs.
    #
    # -1:30 before kickoff (matches at :00 and :30 UTC):
    - cron: '30 14-23 * * *'    # 14:30–23:30  (-1:30 before 16:00–01:00)
    - cron: '30 0,1,2 * * *'    # 00:30–02:30  (-1:30 before 02:00–04:00; result windows)
    - cron: '0 0 * * *'          # 00:00        (-1:30 before 01:30)
    - cron: '0 19 * * *'         # 19:00        (-1:30 before 20:30)
    - cron: '0 22 * * *'         # 22:00        (-1:30 before 23:30)
    - cron: '0 23 * * *'         # 23:00        (-1:30 before 00:30)
    # -2:15 before kickoff (mostly :45; :15 for 20:30 and 01:30 kickoffs):
    - cron: '45 13-23 * * *'    # 13:45–23:45  (-2:15 before 16:00–02:00)
    - cron: '45 0 * * *'         # 00:45        (-2:15 before 03:00)
    - cron: '15 18,23 * * *'    # 18:15, 23:15 (-2:15 before 20:30 and 01:30)
    # Final daily update — midnight Costa Rica (UTC-6 = 06:00 UTC)
    - cron: '0 6 * * *'
  workflow_dispatch:  # allow manual trigger

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run prediction pipeline
        run: python model/predict.py

      - name: Fetch match results
        run: python model/results.py

      - name: Validate predictions
        run: python model/sanity.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/predictions.json \
                  site/data/locked_predictions.json \
                  site/data/results.json \
                  site/data/learning.json \
                  data/kalshi_cache.json
          if git diff --staged --quiet; then
            echo "No changes to predictions."
          else
            git commit -m "chore: update predictions $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy3.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main  # pull the freshly pushed commit

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      # GitHub Pages backend intermittently returns "Deployment failed, try
      # again later" (unrelated to our artifact); retry up to 3 times.
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry 1
        if: steps.deploy1.outcome == 'failure'
        run: sleep 20

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry 2
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 20

      - name: Deploy to GitHub Pages (attempt 3)
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
